site_name: assured-py
site_description: Unofficial Python SDK for the Assured Platform API
site_url: https://assured-py.readthedocs.io
repo_url: https://github.com/jhaisley/assured-py
repo_name: jhaisley/assured-py

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Smart Helpers: guides/smart-helpers.md
      - Authentication: guides/authentication.md
      - File Uploads: guides/file-uploads.md
      - Pagination & DataFrames: guides/pagination.md
      - Payer Enrollment: guides/payer-enrollment.md
  - API Reference:
      - Client: api/client.md
      - Providers: api/providers.md
      - Provider Profile: api/provider-profile.md
      - Credentialing: api/credentialing.md
      - Payer Enrollment: api/payer-enrollment.md
      - Files: api/files.md
      - Users: api/users.md
      - Settings: api/settings.md
      - Exceptions: api/exceptions.md
  - API Divergence: api-divergence.md
